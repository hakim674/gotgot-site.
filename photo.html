<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo-Got Got</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f4; text-align: center; padding: 20px; margin: 0; }
        .back-link { display: inline-block; margin-bottom: 20px; color: #333; text-decoration: none; border: 1px solid #ccc; padding: 8px 15px; border-radius: 30px; transition: 0.3s; font-size: 14px; }
        .back-link:hover { background: #eee; }
        
        /* Grid setup: Mobile-e pashapashi 2ti rakhbe */
        .photo-grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); /* Mobile-e 2ti column */
            gap: 10px; 
            padding: 10px; 
            max-width: 1200px; 
            margin: 0 auto; 
        }

        /* Laptop/Desktop-er jonno layout (3ti ba 4ti kore thakbe) */
        @media (min-width: 768px) {
            .photo-grid { 
                grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); 
                gap: 20px;
                padding: 20px;
            }
        }

        .photo-item { 
            width: 100%; 
            height: 180px; /* Mobile-e height ektu komiyechi jate dekhte shundor lage */
            overflow: hidden; 
            border-radius: 10px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); 
            background: white; 
            cursor: pointer; 
        }

        @media (min-width: 768px) {
            .photo-item { height: 250px; }
        }

        .grid-img { width: 100%; height: 100%; object-fit: cover; transition: 0.4s; }
        .photo-item:hover .grid-img { transform: scale(1.05); }

        /* Pop-up Overlay */
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.85); z-index: 9999; justify-content: center; align-items: center; opacity: 0; transition: opacity 0.3s ease; }
        .overlay.active { display: flex; opacity: 1; }
        
        .lightbox-content { background: #fff; padding: 8px; border-radius: 8px; max-width: 90%; max-height: 85%; position: relative; transform: scale(0.7); transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); }
        .overlay.active .lightbox-content { transform: scale(1); }
        
        #popupImg { max-width: 100%; max-height: 75vh; display: block; border-radius: 4px; }
        .close-hint { position: absolute; top: -30px; right: 0; color: #ccc; font-size: 12px; }
    </style>
</head>
<body>

    <br><a href="index.html" class="back-link">← Back To Home Page</a>
    <h1>Got Got Photo</h1>
    
    <div class="photo-grid">
        <div class="photo-item" onclick="openPopup(this)">
            <img src="bokor.jpg" alt="Image 1" class="grid-img">
        </div>
        <div class="photo-item" onclick="openPopup(this)">
            <img src="bsl.jpg" alt="Image 2" class="grid-img">
        </div>
        <div class="photo-item" onclick="openPopup(this)">
            <img src="ridey.jpeg" alt="Image 3" class="grid-img">
        </div>
        <div class="photo-item" onclick="openPopup(this)">
            <img src="sujons.jpg" alt="Image 4" class="grid-img">
        </div>
        <div class="photo-item" onclick="openPopup(this)">
            <img src="gong (1).jpeg" alt="Image 5" class="grid-img">
        </div>
        <div class="photo-item" onclick="openPopup(this)">
            <img src="gong (2).jpeg" alt="Image 6" class="grid-img">
        </div>
        <div class="photo-item" onclick="openPopup(this)">
            <img src="gong (3).jpeg" alt="Image 7" class="grid-img">
       </div>

         <div class="photo-item" onclick="openPopup(this)">
            <img src="JJ.jpg" alt="Image 7" class="grid-img">
       </div>

        <div class="photo-item" onclick="openPopup(this)">
            <img src="heroalom.jpeg" alt="Image 7" class="grid-img">
       </div>
    </div>

    <div class="overlay" id="popupOverlay" onclick="closePopup()">
        <div class="lightbox-content" onclick="event.stopPropagation()">
            <span class="close-hint">Click outside to close</span>
            <img id="popupImg" src="">
        </div>
    </div>

    <script>
        const overlay = document.getElementById('popupOverlay');
        const popupImg = document.getElementById('popupImg');

        function openPopup(element) {
            const imgSrc = element.querySelector('img').src;
            popupImg.src = imgSrc; 
            overlay.style.display = 'flex';
            setTimeout(() => { overlay.classList.add('active'); }, 10);
        }

        function closePopup() {
            overlay.classList.remove('active');
            setTimeout(() => { overlay.style.display = 'none'; popupImg.src = ""; }, 300);
        }
    </script>
</body>
</html>
